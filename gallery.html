<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Industries and Design | Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bio.html">Bio</a>
    <a href="cards.html">Cards</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </nav>

  <!-- Gallery Section -->
  <section class="gallery">
  <h1>Gallery</h1>
  <div id="gallery-display"></div>

  <!-- Lightbox overlay -->
<div id="lightbox" class="lightbox">
  <button id="lightbox-close" class="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="Full-size image">
</div>

  </section> 

  <!-- Script to load images -->
  <script>
  fetch("/api/gallery")
    .then(res => res.json())
    .then(images => {
      const gallery = document.getElementById("gallery-display");
      images.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Gallery Image";

        // Close button logic
const lightbox = document.getElementById("lightbox");
const closeBtn = document.getElementById("lightbox-close");

// Close when clicking the X button
closeBtn.addEventListener("click", () => {
  lightbox.style.display = "none";
});

// Close when clicking outside the image
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
  }
});

// Close with ESC key
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    lightbox.style.display = "none";
  }
});


        // Add click event to open full-size image
        img.addEventListener("click", () => {
          const lightbox = document.getElementById("lightbox");
          const lightboxImg = document.getElementById("lightbox-img");
          lightboxImg.src = url;
          lightbox.style.display = "flex";
        });

        gallery.appendChild(img);
      });
    })
    .catch(err => console.error("Error loading gallery:", err));
</script>


  <!-- Footer -->
  <footer>
    <p>© 2026 Wolf Industries and Design. All rights reserved.</p>
  </footer>
</body>
</html>
