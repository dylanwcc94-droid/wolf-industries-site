<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf Industries and Design | Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bio.html">Bio</a>
    <a href="cards.html">Cards</a>
    <a href="contact.html">Contact</a>
    <a href="gallery.html">Gallery</a>
  </nav>

  <!-- Gallery Section -->
  <section class="gallery">
  <h1>Gallery</h1>
  <div id="gallery-display"></div>

  <!-- Lightbox overlay -->
<div id="lightbox" class="lightbox">
  <button id="lightbox-close" class="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="Full-size image">
</div>

  </section> 

  <!-- Script to load images -->
  <script>
  const gallery = document.getElementById("gallery-display");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const closeBtn = document.getElementById("lightbox-close");

  // ✅ List of images inside public/assets/
  const images = [
    "assets/image1.jpg",
    "assets/image2.jpg",
    "assets/image3.jpg",
    "assets/image4.jpg"
    // Add more filenames here as needed
  ];

  // Load images into gallery
  images.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.alt = "Gallery Image";
    img.style.cursor = "pointer";

    // Open lightbox
    img.addEventListener("click", () => {
      lightboxImg.src = url;
      lightbox.style.display = "flex";
    });

    gallery.appendChild(img);
  });

  // Close when clicking the X button
  closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  // Close when clicking outside the image
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  });

  // Close with ESC key
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      lightbox.style.display = "none";
    }
  });
</script>
